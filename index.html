<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy Buat Ayla</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
        "three/addons/controls/OrbitControls.js": "https://unpkg.com/three@0.152.2/examples/jsm/controls/OrbitControls.js",
        "three/examples/jsm/loaders/FontLoader.js": "https://unpkg.com/three@0.152.2/examples/jsm/loaders/FontLoader.js",
        "three/examples/jsm/geometries/TextGeometry.js": "https://unpkg.com/three@0.152.2/examples/jsm/geometries/TextGeometry.js"
      }
    }
  </script>
</head>

<body>
  <div id="container"></div>

  <div id="landscape-warning">
    <div class="warning-content">
      <div class="rotate-icon"></div>
      <h1>Stellar Bloom</h1>
      <h1>Tinh Cầu</h1>
      <div class="stars-bg"></div>
    </div>
  </div>

  <div id="dark-overlay"></div>
  <div id="info"></div>

  <h1 style="position: fixed; bottom: 10px; right: 10px; font-size: 18px; font-family: Arial, sans-serif; color: white; background: rgba(0, 0, 0, 0.4); padding: 6px 12px; border-radius: 8px; z-index: 9999;">
    by bayursdn
  </h1>

  <!-- Audio MP3 lokal -->
  <audio id="bgMusic" src="SZA_-_Kill_Bill__Official_Audio_.mp3" preload="auto"></audio>

  <!-- ===== OVERLAY "KLIK UNTUK MULAI" (semua platform) ===== -->
  <div id="start-screen" style="
    position: fixed;
    z-index: 99999;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, #0a0a2e 0%, #000000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    cursor: pointer;
  ">
    <div style="
      text-align: center;
      padding: 2.5rem 3rem;
      border-radius: 24px;
      background: rgba(20, 30, 60, 0.85);
      border: 1.5px solid rgba(0, 234, 255, 0.5);
      box-shadow: 0 0 50px rgba(0, 234, 255, 0.25);
      animation: pulseGlow 2s ease-in-out infinite;
    ">
      <div style="font-size: 3.5rem; margin-bottom: 0.5rem;">🌌</div>
      <h2 style="
        color: #fff;
        font-family: Arial, sans-serif;
        font-size: 1.6rem;
        margin-bottom: 0.5rem;
        letter-spacing: 2px;
        text-shadow: 0 0 12px #a259f7;
      ">Galaxy Buat Ayla</h2>
      <p style="
        color: #a0c4ff;
        font-family: Arial, sans-serif;
        font-size: 0.95rem;
        margin-bottom: 1.8rem;
        letter-spacing: 1px;
      ">Klik untuk memulai perjalanan ✨</p>
      <button id="enter-btn" style="
        font-size: 1.15rem;
        padding: 0.75rem 2.2rem;
        border-radius: 50px;
        border: none;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #00eaff 100%);
        color: #fff;
        font-family: Arial, sans-serif;
        font-weight: bold;
        letter-spacing: 1px;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(102, 126, 234, 0.6), 0 0 40px rgba(0, 234, 255, 0.3);
        transition: transform 0.15s;
        -webkit-tap-highlight-color: transparent;
      ">
        🚀 Masuk ke Galaxy
      </button>
    </div>
    <style>
      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 50px rgba(0, 234, 255, 0.25); }
        50% { box-shadow: 0 0 80px rgba(0, 234, 255, 0.5), 0 0 100px rgba(162, 89, 247, 0.2); }
      }
      #enter-btn:active { transform: scale(0.95); }
    </style>
  </div>

  <script>
    const bgMusic = document.getElementById('bgMusic');
    const startTime = 22;  // mulai dari detik 22
    const endTime = 55;    // loop kembali ke detik 22

    // Loop antara startTime - endTime (tanpa delay timeupdate)
    bgMusic.addEventListener('timeupdate', () => {
      if (bgMusic.currentTime >= endTime || bgMusic.currentTime < startTime) {
        bgMusic.currentTime = startTime;
      }
    });

    const startScreen = document.getElementById('start-screen');
    const enterBtn = document.getElementById('enter-btn');

    let audioUnlocked = false;
    let musicPlaying = false;

    function unlockAndStart() {
      if (audioUnlocked) return;
      audioUnlocked = true;

      // Langsung sembunyikan overlay tanpa delay
      startScreen.style.display = 'none';

      // Preload audio ke posisi yang benar agar tidak ada delay saat planet diklik
      bgMusic.currentTime = startTime;
      // Putar lalu langsung pause — ini "memanaskan" audio context
      // sehingga saat planet diklik nanti, langsung bunyi tanpa jeda
      const warmup = bgMusic.play();
      if (warmup !== undefined) {
        warmup.then(() => {
          bgMusic.pause();
          bgMusic.currentTime = startTime;
        }).catch(() => {});
      }
    }

    enterBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      unlockAndStart();
    });
    startScreen.addEventListener('click', unlockAndStart);
    startScreen.addEventListener('touchend', function(e) {
      e.preventDefault();
      unlockAndStart();
    }, { passive: false });

    // Dipanggil dari script.js saat planet diklik/ditap
    window.ytPlayer = {
      playVideo: () => {
        if (musicPlaying) return;
        musicPlaying = true;
        bgMusic.currentTime = startTime;
        bgMusic.play().catch(err => console.warn('Audio play error:', err));
      }
    };
  </script>

  <script type="module" src="script.js"></script>
</body>
</html>
