<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy Untuk Ayla</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
        "three/addons/controls/OrbitControls.js": "https://unpkg.com/three@0.152.2/examples/jsm/controls/OrbitControls.js",
        "three/examples/jsm/loaders/FontLoader.js": "https://unpkg.com/three@0.152.2/examples/jsm/loaders/FontLoader.js",
        "three/examples/jsm/geometries/TextGeometry.js": "https://unpkg.com/three@0.152.2/examples/jsm/geometries/TextGeometry.js"
      }
    }
  </script>
</head>

<body>
  <div id="container"></div>

  <div id="landscape-warning">
    <div class="warning-content">
      <div class="rotate-icon"></div>
      <h1>Stellar Bloom</h1>
      <h1>Tinh Cầu</h1>
      <div class="stars-bg"></div>
    </div>
  </div>

  <div id="dark-overlay"></div>
  <div id="info"></div>

  <h1 style="position: fixed; bottom: 10px; right: 10px; font-size: 18px; font-family: Arial, sans-serif; color: white; background: rgba(0, 0, 0, 0.4); padding: 6px 12px; border-radius: 8px; z-index: 9999;">
    by bayursdn
  </h1>

  <!-- Audio MP3 lokal -->
  <audio id="bgMusic" src="SZA_-_Kill_Bill__Official_Audio_.mp3" preload="auto"></audio>

  <script>
    const bgMusic = document.getElementById('bgMusic');
    const startTime = 28;
    const endTime = 55;

    // Loop antara startTime - endTime
    bgMusic.addEventListener('timeupdate', () => {
      if (bgMusic.currentTime >= endTime) {
        bgMusic.currentTime = startTime;
        bgMusic.play().catch(() => {});
      }
    });

    // Unlock audio context di HP: 
    // Browser HP butuh interaksi user sebelum audio bisa diplay.
    // Kita "prime" audio saat touchstart pertama kali di layar.
    let audioUnlocked = false;
    function unlockAudio() {
      if (audioUnlocked) return;
      audioUnlocked = true;
      // Mainkan sebentar lalu pause — ini "membuka kunci" audio context HP
      bgMusic.currentTime = startTime;
      bgMusic.play().then(() => {
        bgMusic.pause();
        bgMusic.currentTime = startTime;
      }).catch(() => {});
      document.removeEventListener('touchstart', unlockAudio);
    }
    document.addEventListener('touchstart', unlockAudio, { once: true });

    // Dipanggil dari script.js saat planet diklik/ditap
    window.ytPlayer = {
      playVideo: () => {
        bgMusic.currentTime = startTime;
        bgMusic.play().catch(err => console.warn('Audio play error:', err));
      }
    };
  </script>

  <script type="module" src="script.js"></script>
</body>
</html>
