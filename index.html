<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy Untuk Ayla</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
        "three/addons/controls/OrbitControls.js": "https://unpkg.com/three@0.152.2/examples/jsm/controls/OrbitControls.js",
        "three/examples/jsm/loaders/FontLoader.js": "https://unpkg.com/three@0.152.2/examples/jsm/loaders/FontLoader.js",
        "three/examples/jsm/geometries/TextGeometry.js": "https://unpkg.com/three@0.152.2/examples/jsm/geometries/TextGeometry.js"
      }
    }
  </script>
</head>

<body>
  <div id="container"></div>

  <div id="landscape-warning">
    <div class="warning-content">
      <div class="rotate-icon"></div>
      <h1>Stellar Bloom</h1>
      <h1>Tinh Cầu</h1>
      <div class="stars-bg"></div>
    </div>
  </div>

  <div id="dark-overlay"></div>
  <div id="info"></div>

  <!-- Tombol tap to start khusus HP agar audio bisa jalan -->
  <div id="mobile-start-overlay">
    <div id="mobile-start-box">
      <div class="sparkle">✨</div>
      <p>Tap untuk memulai</p>
      <button id="mobile-start-btn">🌌 Masuk ke Galaxy</button>
    </div>
  </div>

  <h1 style="position: fixed; bottom: 10px; right: 10px; font-size: 18px; font-family: Arial, sans-serif; color: white; background: rgba(0, 0, 0, 0.4); padding: 6px 12px; border-radius: 8px; z-index: 9999;">
    by bayursdn
  </h1>

  <!-- Audio MP3 lokal -->
  <audio id="bgMusic" src="SZA_-_Kill_Bill__Official_Audio_.mp3" preload="auto"></audio>

  <script>
    const bgMusic = document.getElementById('bgMusic');
    const startTime = 28;
    const endTime = 55;

    bgMusic.addEventListener('timeupdate', () => {
      if (bgMusic.currentTime >= endTime) {
        bgMusic.currentTime = startTime;
        bgMusic.play().catch(() => {});
      }
    });

    window._audioUnlocked = false;

    function unlockAndPlayAudio() {
      if (window._audioUnlocked) return;
      window._audioUnlocked = true;
      bgMusic.currentTime = startTime;
      bgMusic.play().catch(err => console.warn('Audio error:', err));
    }

    window.ytPlayer = {
      playVideo: () => {
        unlockAndPlayAudio();
      }
    };

    const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    const mobileOverlay = document.getElementById('mobile-start-overlay');
    const mobileBtn = document.getElementById('mobile-start-btn');

    if (isMobile) {
      mobileOverlay.style.display = 'flex';
      mobileBtn.addEventListener('click', () => {
        bgMusic.currentTime = startTime;
        bgMusic.play().then(() => {
          bgMusic.pause();
          window._audioUnlocked = true;
        }).catch(() => {
          window._audioUnlocked = true;
        });
        mobileOverlay.style.display = 'none';
      });
    } else {
      mobileOverlay.style.display = 'none';
    }
  </script>

  <script type="module" src="script.js"></script>
</body>
</html>
